<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test</title>
</head>
<body>
    <button onclick="test()">Test</button>
    <div id="result"></div>
    <script>
        var skillMetadata = {
            "comps": {
                title: "可比公司分析",
                fullDocumentation: `# 测试

## 概述

这是测试内容。`
            }
        };

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function renderMarkdown(markdown) {
            if (!markdown) return 'EMPTY';
            var html = markdown;
            html = html.replace(/^## (.*)$/gm, '<h2>$1</h2>');
            html = html.replace(/^# (.*)$/gm, '<h1>$1</h1>');
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
            return html;
        }

        function test() {
            var skill = skillMetadata['comps'];
            console.log('skill:', skill);
            console.log('fullDocumentation:', skill.fullDocumentation);
            console.log('typeof fullDocumentation:', typeof skill.fullDocumentation);

            if (skill.fullDocumentation) {
                document.getElementById('result').innerHTML = renderMarkdown(skill.fullDocumentation);
            } else {
                document.getElementById('result').innerHTML = 'No fullDocumentation';
            }
        }
    </script>
</body>
</html>
