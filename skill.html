                fullDocumentation: `# 可比公司分析 (Comparable Company Analysis)

## 概述

可比公司分析（Comps）是投行和投资机构最常用的估值方法。核心思想很简单：**找相似的公司对比**。

就像你卖房时会参考隔壁邻居的成交价一样，给公司估值时也要看同行业、同规模的公司交易在什么倍数。市场是有效的，同类公司的估值水平可以给目标公司提供参考基准。

## 核心原则

**"先建立正确的结构，然后让数据讲故事。"**

从强制战略思考的标题开始，输入干净的数据，建立透明的公式，让统计数据自动出现。一个好的Comps应该让没有构建它的人也能立即理解。

## 分析步骤

### 第1步：确定分析框架

**做什么**：明确分析目的（并购、IPO、投资决策）、受众（投委会、客户、内部团队）、输出格式（Excel/PDF/PPT）

**为什么**：不同的目的需要不同的深度和重点。并购估值要详细，行业概览可以简化

**注意**：四个关键问题——什么格式？谁来看？回答什么问题？什么上下文？

### 第2步：选择可比公司

**做什么**：筛选4-8家同行业、规模相当、业务模式相似的公司。排除收购标的、异常值

**为什么**：可比公司的选择直接影响分析的可靠性。苹果不能和橙子比

**注意**：筛选标准包括行业(相同GICS)、地域、规模(收入市值相当)、产品类型、客户群体

### 第3步：拉取运营数据

**做什么**：收集历史数据(3-5年)：收入、增长率、毛利率、EBITDA利润率、FCF利润率

**为什么**：运营指标反映公司的盈利能力和成长性，是估值的基础

**注意**：优先使用MCP数据源(FactSet、S&P Kensho)，确保数据一致性和可追溯性

### 第4步：计算估值倍数

**做什么**：计算企业价值倍数：EV/Revenue、EV/EBITDA；股权倍数：P/E、P/B

**为什么**：倍数是市场对每单位盈利/收入的定价。EV/EBITDA最常用因为不受资本结构影响

**注意**：企业价值EV=市值+净债务+优先股+少数股东权益-现金；千万不能用错市值

### 第5步：统计分析

**做什么**：计算均值、中位数、25/75分位数。去掉异常值后重新计算

**为什么**：平均值会被极端值扭曲。分位数告诉你"大多数公司"在什么水平

**注意**：75分位数是优质公司的交易区间；如果目标公司>75分位可能高估，<25分位可能低估

### 第6步：得出结论

**做什么**：对比目标公司与可比公司的分布位置，判断高估/低估

**为什么**：分析的价值在于得出结论，不能只摆数据不做判断

**注意**：结论要平衡：如果是高估，解释可能原因(成长性更好、利润率更高)

## 最佳实践

### 数据来源优先级

**始终遵循以下数据源层次：**

1. **首先：检查MCP数据源** - 如果S&P Kensho MCP、FactSet MCP或Daloopa MCP可用，请专门使用它们获取财务和交易信息
2. **不要使用网络搜索** - 如果上述MCP数据源可用
3. **仅当MCP不可用时：** 然后使用Bloomberg Terminal、SEC EDGAR文件或其他机构来源

- 每个衍生值（利润率、倍数、统计数据）必须是引用输入单元格的Excel公式 — 永远不要粘贴预计算的数字
- 使用Python/openpyxl构建工作表时：写入 cell.value = "=E7/C7"（公式字符串），而不是 cell.value = 0.687（计算结果）
- 唯一应该硬编码的值是原始输入数据（收入、EBITDA、股价等） — 并且每个值都要有单元格注释说明其来源
- 原因：当输入变化时，模型必须自动更新。硬编码的利润率是一个潜伏的错误。

- 设置结构后 → 在填充数据之前向用户显示标题布局
- 输入原始输入后 → 在构建公式之前向用户显示输入块并确认来源/期间

## 统计分析的重要性

分位数显示了分布，而不仅仅是平均值：

- **75th percentile** = "优质"公司的交易水平
- **Median** = 典型市场估值
- **25th percentile** = "折价"区间

这有助于回答："与同行相比，我们的目标公司是交易昂贵还是便宜？"

## 常见错误

❌ 混合市值和企业价值进行公式计算
❌ 分子和分母使用不同的时期（LTM vs 季度）
❌ 硬编码数字到公式中而不是单元格引用
❌ **硬编码输入没有单元格注释引用来源或解释假设**

❌ 包含不可比的公司（不同的业务模式）
❌ 使用没有披露的过时数据

## 关键原则总结

1. **结构驱动洞察** - 正确的标题强制正确的思考
2. **少即是多** - 5-10个重要指标胜过20个不重要的
3. **为你的问题选择指标** - 估值分析 ≠ 效率分析
4. **统计数据显示模式** - 中位数/分位数比平均值揭示更多

6. **可比性是王道** - 最好排除而不是强制一个不好的可比公司

## 概述

DCF（折现现金流）是理论上最严谨的估值方法。核心思想很简单：**公司值多少钱 = 它未来能赚的所有钱，折算成今天的价值**。

今天的100块比明年的100块更值钱，因为今天可以投资理财。所以未来的现金流要"打折"（折现）才能和今天的钱比较。WACC就是这个折现率，反映投资的风险。

## 核心原则

**"现金流是企业的血液，折现率是风险的标尺。"**

DCF建模的核心在于：合理预测未来现金流，选择合适的折现率，正确计算终值。模型的价值不在于精确的数字，而在于清晰的逻辑和合理的假设。

## 分析步骤

### 第1步：建立历史财务数据

**做什么**：拉取过去3-5年的历史数据：利润表、资产负债表、现金流量表

**为什么**：历史数据是预测的基础。需要分析过去的增长模式、利润率趋势、资本结构

**注意**：至少3年数据才能看出趋势；如果有并购或重组需要调整历史数据

### 第2步：收入预测

**做什么**：用增长率驱动或自下而上方法预测未来5-10年收入

**为什么**：收入是整个模型的起点。收入假设是DCF最重要的变量

**注意**：增长率驱动：用"增长率"简单预测；自下而上：单价×销量更精确

### 第3步：费用和利润率预测

**做什么**：预测毛利率、运营费用率、税率。计算EBITDA、EBIT、净利润

**为什么**：利润率反映公司的盈利能力。不同行业利润率差异很大，要参考历史和同业

**注意**：毛利率通常稳定；运营费用有规模效应(收入增长费用率下降)；税率用法定税率

### 第4步：计算自由现金流(FCF)

**做什么**：FCF = EBIT×(1-税率) + 折旧摊销 - 资本支出 - 营运资本变化

**为什么**：FCF是公司真正可自由分配给债权人和股东的现金

**注意**：营运资本变化 = (应收账款+存货-应付账款)的变化；扩张期营运资本增加拖累FCF

### 第5步：计算WACC

**做什么**：WACC = 债务成本×(1-税率)×债务权重 + 股权成本×股权权重

**为什么**：WACC是折现率，反映投资风险。风险越高折现率越高，估值越低

**注意**：股权成本用CAPM：无风险利率+β×股权风险溢价(通常5-6%)

### 第6步：计算终值

**做什么**：永续增长法：最后一年FCF×(1+g)/(WACC-g)；或退出倍数法

**为什么**：终值占估值的50-70%。预测期只有5-10年，但公司永续经营

**注意**：终值增长率g必须<WACC，通常2-3%(GDP增长)；退出倍数用历史平均

### 第7步：折现加总得出企业价值

**做什么**：预测期FCF折现 + 终值折现 = 企业价值；减去净债务 = 股权价值

**为什么**：把未来所有现金流折现到今天，得到公司的内在价值

**注意**：净债务 = 总债务 - 现金；股权价值÷股数 = 每股价值，与股价比较判断高估/低估

## 最佳实践

### 数据来源优先级

**始终遵循以下数据源层次：**

1. **首先：检查MCP数据源** - 如果S&P Kensho MCP、FactSet MCP或Daloopa MCP可用，请专门使用它们获取财务和交易信息

### 假设设置的合理性

- 收入增长率应该与历史和行业趋势一致
- 利润率应该考虑竞争压力和规模效应
- 终值增长率应该接近或低于GDP增长率
- WACC应该反映公司真实的风险水平

### 敏感性分析

- DCF对假设非常敏感，必须做敏感性分析
- 关键假设：收入增长率、利润率、WACC、终值增长率
- 用敏感性矩阵展示不同假设下的估值区间

## 常见错误

❌ 终值增长率大于或等于WACC

❌ 混淆企业价值折现和股权价值折现

7. **简洁优于复杂** - 模型太复杂反而容易出错

                fullDocumentation: `# LBO杠杆收购模型

## 概述

LBO（Leveraged Buyout，杠杆收购）是私募股权基金的经典交易结构。核心思想很简单：**借钱买公司，用公司的现金流还债，3-5年后卖出获利**。

杠杆放大回报：如果公司价值涨50%，自有资金回报可能翻几倍。但风险也高，债务太重还不出就崩了。

## 核心原则

**"杠杆是放大器，既放大收益，也放大风险。"**

LBO建模的核心在于：合理设计资本结构，准确预测现金流，严格管理债务偿还。成功的LBO需要稳定的现金流、合理的债务水平和合适的退出时机。

## 分析步骤

### 第1步：资金来源与使用

**做什么**：Sources: 股权(20-30%)、高级债(50-60%)、夹层债(10-20%)；Uses: 收购股权、偿还债务、交易费用

**为什么**：这是LBO的基本会计等式：Sources = Uses。收购花的每一分钱都要有出处

**注意**：股权比例越高回报越低但风险越低；高级债利率最低(6-8%)，夹层债利率高(12-15%)

### 第2步：建立运营模型

**做什么**：预测收入、成本、利润率，计算EBITDA和FCF

**为什么**：现金流是还债的来源。预测必须保守，不能太乐观

**注意**：做三情景分析：Base(基准)、Upside(乐观)、Downside(悲观)；投资人最关心Downside

### 第3步：债务计划

**做什么**：列出各层债务：本金、利率、还款计划、优先级

**为什么**：LBO的核心是债务管理。不同层级债务有不同还款规则和优先级

**注意**：高级债定期还本付息；夹层债可能PIK(付息方式用票据代替现金)；次级债最后还

### 第4步：现金流瀑布

**做什么**：用FCF按优先级还债：高级债 → 夹层债 → 次级债

**为什么**：现金流瀑布决定了债务偿还顺序和最终股权价值

**注意**：如果FCF不够还高级债，次级债一分钱拿不到；这就是瀑布结构的残酷性

### 第5步：回报分析

**做什么**：计算IRR(内部收益率)、MOIC(投资倍数)

**为什么**：IRR和MOIC是私募股权的核心指标。IRR>20%是好交易

**注意**：现金流符号：投资是负，退出收益是正；MOIC=总收益/总投资

### 第6步：敏感性分析

**为什么**：投资人有不同看法。敏感性分析展示不同情景下的回报区间

## 概述

三表模型是所有财务分析的基石。核心原则很简单：**三表必须联动**。

利润表的净利润流入资产负债表的留存收益，资产负债表的现金变化反映在现金流量表。如果三表不平衡，模型就是错的。资产必须等于负债加权益。

## 核心原则

**"三表是一家，不是三家。它们描述同一件事的不同角度。"**

三表联动建模的核心在于：理解三表之间的勾稽关系，确保逻辑一致，始终保持平衡。不平衡的模型没有任何价值。

## 分析步骤

### 第1步：建立利润表

**做什么**：从收入开始，减去成本费用，得到净利润

**为什么**：利润表展示公司的盈利能力。收入驱动一切

**注意**：收入 → 毛利润(收入-销货成本) → EBITDA(毛利-运营费用) → EBIT(EBITDA-折旧) → 净利润

### 第2步：建立资产负债表

**做什么**：资产 = 负债 + 股东权益。资产包括流动和非流动，负债包括流动和非流动

**为什么**：资产负债表展示公司的财务状况。必须永远平衡

**注意**：资产：现金、应收账款、存货、固定资产；负债：应付账款、债务；权益：股本、留存收益

### 第3步：建立现金流量表

**做什么**：经营活动CF + 投资活动CF + 筹资活动CF = 现金净变化

**为什么**：现金流量表展示现金的实际流动。从净利润开始调节

**注意**：经营CF = 净利润 + 折旧(非现金) - 营运资本增加；投资CF = 资本支出；筹资CF = 债务、分红

### 第4步：三表联动

**做什么**：利润表净利润 → 资产负债表留存收益；现金流量表期末现金 → 资产负债表货币资金

**为什么**：三表联动的核心：净利润增加股东权益，现金变化反映在资产负债表

**注意**：留存收益期末 = 留存收益期初 + 净利润 - 分红；期末现金 = 期初现金 + 现金净变化

### 第5步：验证平衡

**做什么**：检查：资产=负债+权益？现金流量表平衡？营运资本变化正确？

**为什么**：不平衡的模型没有任何价值。必须确保所有勾稽关系正确

**注意**：添加检查行：资产 - (负债+权益) = 0；如果不为零，找到错误根源

## 三表联动关系

### 利润表 → 资产负债表

- 净利润 → 留存收益增加
- 分红 → 留存收益减少、现金减少
- 其他综合收益 → 其他综合收益科目

### 资产负债表 → 现金流量表

- 现金变化 → 筹资活动CF
- 营运资本变化 → 经营活动CF
- 固定资产变化 → 投资活动CF

### 现金流量表 → 资产负债表

- 现金净变化 → 货币资金期末余额
- 债务变化 → 债务期末余额

1. 先建立利润表

3. 最后建立现金流量表
4. 检查三表联动

## 概述

模型审计是质量控制的关键环节。核心原则很简单：**发出去之前先审一遍**。

审计包括公式错误检查、硬编码检测、逻辑一致性验证、财务模型完整性检查等。一个小的错误可能导致错误的决策，甚至信誉损失。

## 核心原则

**"模型审计不是找茬，而是确保决策基于准确的数据。"**

模型审计的核心在于：系统化检查、分类问题、推动修复、建立信任。好的审计能发现隐藏的错误，提升模型质量。

## 分析步骤

### 第1步：确定审计范围

**做什么**：选择要审计的范围：选中区域/当前工作表/整个模型

**为什么**：不同范围深度不同。完整模型审计包括三表平衡、现金勾稽等

**注意**：发客户/投委会前用完整审计；日常检查用工作表级即可

### 第2步：公式级检查

**做什么**：检查：公式错误(#REF!/#VALUE!/#N/A)、硬编码、不一致公式、范围偏移、循环引用

**为什么**：公式错误会让模型崩溃；硬编码让模型不灵活；不一致公式可能隐藏错误

**注意**：硬编码检测：公式中的数字(如=A1*1.05)应改为单元格引用

### 第3步：逻辑一致性检查

**做什么**：检查：小计正确、汇总正确、跨表引用正确、符号一致性

**为什么**：逻辑错误比公式错误更隐蔽，但会导致错误结论

**注意**：用检查行：小计=各分项之和；汇总=各小计之和

### 第4步：财务模型完整性检查

**做什么**：检查：资产负债表平衡(资产=负债+权益)、现金勾稽、滚动平衡

**为什么**：这是财务模型的核心要求。不平衡的模型没有价值

**注意**：资产-(负债+权益)=0；如果不为0，逐项检查

### 第5步：数据合理性检查

**做什么**：检查：数值合理性、趋势合理性、比率在正常范围

**为什么**：数字正确不代表结论正确。异常值可能指示错误

**注意**：毛利率50%？可能高了。收入增长100%？是否合理？

### 第6步：生成审计报告

**做什么**：汇总所有发现的问题，按严重程度分类，给出修复建议

**为什么**：审计的价值在于发现问题并推动修复

**注意**：分三类：致命错误(必须修)、警告(建议修)、提示(可优化)

## 审计检查清单

### 公式错误

- [ ] #REF! 错误
- [ ] #VALUE! 错误
- [ ] #N/A 错误
- [ ] #DIV/0! 错误

- [ ] 汇总=小计之和
- [ ] 跨表引用正确
- [ ] 符号一致性

### 财务完整性

- [ ] 资产负债表平衡
- [ ] 现金流量表平衡
- [ ] 净利润→留存收益

## 常见错误类型

### 致命错误

- 循环引用

### 警告

- 缺少检查行
- 命名不清楚

### 提示

## 输出检查清单

审计报告应该包括：

## 概述

垃圾进，垃圾出。数据清洗是分析的基础。核心原则很简单：**原始数据通常有各种问题**。

清洗后的数据应该：格式统一、无缺失、无异常、可追溯。好的数据清洗是准确分析的基础。

## 核心原则

**"数据清洗不是篡改数据，而是让数据更准确可用。"**

数据清洗的核心在于：识别问题、合理处理、保持可追溯性。每一步清洗操作都应该记录，确保数据来源清晰。

## 分析步骤

### 第1步：数据源评估

**做什么**：检查数据来源、时间范围、覆盖面、字段完整性

**为什么**：了解数据质量，预设清洗策略

**注意**：MCP数据源最可靠；爬虫数据需要大量清洗

### 第2步：格式标准化

**做什么**：统一日期格式、数字格式(千/百万)、货币单位、百分比格式

**为什么**：格式不统一会导致计算错误或分析失败

**注意**：日期统一用YYYY-MM-DD；数字统一用实际值而非千分位

### 第3步：缺失值处理

**做什么**：识别缺失值，决定填充策略：前值填充/插值/均值/删除

**为什么**：缺失值不能直接忽略，需要合理处理

**注意**：时间序列：用前值填充；横截面：用均值填充

### 第4步：异常值处理

**做什么**：识别异常值，决定处理策略：验证/修正/删除/标记

**为什么**：异常值会扭曲统计结果，但可能包含重要信息

**注意**：先验证是否真实异常；如果是错误则修正，如果是真实则保留并标记

### 第5步：去重和关联

**做什么**：删除重复记录，建立数据关联(如公司代码与股票代码)

**为什么**：重复数据会重复计算；数据关联让分析更灵活

**注意**：保留最新记录；建立代码映射表

### 第6步：验证和记录

**做什么**：验证清洗后数据的一致性，记录所有清洗操作

**为什么**：数据可追溯性很重要，审计时需要知道数据来源和变更

**注意**：创建清洗日志：日期、操作、原因、影响

## 常见数据问题

### 格式问题

- 日期格式不统一
- 数字包含千分位
- 货币单位不一致
- 百分比格式混乱

### 缺失值

- 完全随机缺失
- 随机缺失
- 非随机缺失

### 异常值

- 输入错误
- 测量误差
- 真实异常

## 处理策略

### 缺失值处理

| 策略 | 适用场景 | 优点 | 缺点 |
|------|----------|------|------|
| 删除 | 缺失比例<5% | 简单 | 丢失信息 |
| 前值填充 | 时间序列 | 保持趋势 | 可能传播错误 |
| 均值填充 | 横截面 | 保持分布 | 降低方差 |
| 插值 | 时间序列 | 平滑 | 可能不准确 |

### 异常值处理

| 策略 | 适用场景 | 优点 | 缺点 |
|------|----------|------|------|
| 删除 | 确认错误 | 清理数据 | 丢失信息 |
| 修正 | 可推断真实值 | 保持数据 | 可能引入偏差 |
| 保留 | 真实异常 | 保持信息 | 影响统计 |
| 标记 | 不确定 | 可追溯 | 需要后续处理 |

## 输出检查清单

清洗后的数据应该：
- [ ] 格式统一
- [ ] 无缺失值或已处理
- [ ] 无异常值或已标记
- [ ] 无重复记录
- [ ] 数据关联正确
- [ ] 有清洗日志
- [ ] 可追溯来源
- [ ] 验证通过

## 关键原则总结

1. **先评估再清洗** - 了解数据质量再制定策略
2. **保持可追溯性** - 每一步都要记录
3. **合理处理缺失** - 不要简单删除
4. **谨慎处理异常** - 验证后再决定
5. **格式统一** - 确保可计算
6. **验证结果** - 清洗后要验证
7. **建立日志** - 记录所有操作

## 概述

投资决策不能只看公司本身，核心原则很简单：**必须放在竞争环境中评估**。

竞争分析帮助你理解公司在行业中的位置、竞争优势和风险。核心问题：相对竞争对手，这家公司更强还是更弱？为什么？

## 核心原则

**"没有公司是孤岛。竞争地位决定长期回报。"**

竞争分析的核心在于：识别竞争对手、对比分析、评估相对位置、预判竞争动态。好的竞争分析能发现被低估的领先者或被高估的追随者。

## 分析步骤

### 第1步：识别竞争格局

**做什么**：确定主要竞争对手(直接竞争对手、间接竞争对手、潜在进入者)

**为什么**：不了解竞争就无法评估公司的真实表现

**注意**：直接竞争：相同产品相同市场；间接竞争：替代产品

### 第2步：收集竞争数据

**做什么**：收集竞争对手的：产品、价格、渠道、营销、财务数据

**为什么**：对比分析需要可比数据

**注意**：公开来源：年报、公告、新闻；MCP数据源更高效

### 第3步：产品/服务对比

**做什么**：对比：功能、质量、价格、创新速度、客户满意度

**为什么**：产品是竞争的核心战场

**注意**：用评分矩阵量化对比；关注差异化优势

### 第4步：财务表现对比

**做什么**：对比：增长率、利润率、ROE、资产周转率

**为什么**：财务表现反映战略执行效果

**注意**：用图表可视化对比；关注趋势而不只是当前值

### 第5步：战略和定位分析

**做什么**：分析各公司的战略定位、目标客户、价值主张

**为什么**：了解竞争对手的战略意图，预判未来竞争动态

**注意**：波特五力、SWOT分析、战略集团图

### 第6步：得出竞争结论

**做什么**：评估目标公司的相对位置：领先者/挑战者/追随者/利基玩家

**为什么**：竞争地位影响投资逻辑和估值倍数

**注意**：领先者享受估值溢价；挑战者需要更强的催化剂

## 竞争分析框架

### 波特五力分析

1. **现有竞争者竞争强度**
2. **新进入者威胁**
3. **替代品威胁**
4. **供应商议价能力**
5. **客户议价能力**

### SWOT分析

- **优势(Strengths)**：内部优势
- **劣势(Weaknesses)**：内部劣势
- **机会(Opportunities)**：外部机会
- **威胁(Threats)**：外部威胁

### 竞争地位分类

| 地位 | 特征 | 估值影响 | 投资逻辑 |
|------|------|----------|----------|
| 领导者 | 市场份额第一 | 估值溢价 | 质量投资 |
| 挑战者 | 快速追赶 | 估值合理 | 成长投资 |
| 追随者 | 跟随策略 | 估值折价 | 价值投资 |
| 利基玩家 | 专注细分 | 取决于利基 | 特殊机会 |

## 最佳实践

### 数据收集

- 使用多个来源
- 关注最新数据
- 验证数据准确性
- 保持数据更新

### 对比分析

- 使用可比指标
- 关注趋势变化
- 量化差异
- 可视化展示

### 结论评估

- 基于证据
- 考虑动态变化
- 评估可持续性
- 给出明确观点

- [ ] 相对位置评估
- [ ] 投资建议
- [ ] 数据来源说明

1. **竞争是动态的** - 关注竞争格局变化
2. **相对而非绝对** - 相对竞争对手的表现更重要
3. **多维度分析** - 产品、财务、战略都要看
4. **量化对比** - 用数据说话
5. **关注可持续性** - 竞争优势能否持续
6. **预判变化** - 竞争格局会怎么变
7. **投资导向** - 分析要服务于投资决策

## 概述

财报更新是卖方分析师的核心工作。核心原则很简单：**24-48小时内出报告**。

快速分析业绩表现，更新估值和投资建议。重点是新信息：超预期/低于预期、驱动因素、未来展望变化。

## 核心原则

**"速度很重要，但准确更重要。快速反应，准确分析。"**

财报分析的核心在于：快速阅读、识别关键信息、更新模型、评估影响、给出建议。好的财报分析帮助客户快速做出决策。

## 分析步骤

### 第1步：快速阅读财报

**做什么**：30分钟内通读财报，关注：收入/利润vs预期、驱动因素、管理层展望

**为什么**：财报发布会股价反应剧烈，需要快速理解关键信息

**注意**：先看新闻稿摘要，再细节；注意管理层口径变化

### 第2步：业绩vs预期分析

**做什么**：对比实际vs一致预期：收入、EBITDA、净利润，量化差异

**为什么**：超预期/低于预期是市场关注的核心

**注意**：收入超3%是显著超预期；解释超/欠预期的驱动因素

### 第3步：细分业务分析

**做什么**：分析各业务线/地区表现：增长率、利润率变化、贡献占比

**为什么**：整体数字掩盖细节，细分业务揭示真实趋势

**注意**：关注高增长业务是否持续；关注拖累业务的改善空间

**做什么**：根据新数据更新模型：历史数据、预测假设、估值

**为什么**：模型是估值基础，必须及时更新

**为什么**：投资决策基于论点，财报是验证论点的重要信息

**注意**：如果论点被削弱，考虑降级；如果强化，可考虑上调目标价

### 第6步：撰写报告

**做什么**：8-12页报告：摘要、业绩亮点、模型更新、估值、风险、投资建议

                fullDocumentation: `# 并购模型

## 概述

并购是投行的核心业务。核心原则很简单：**并购模型分析交易的财务影响**。

买方出多少钱？怎么融资？协同效应有多大？EPS是增厚还是摊薄？核心输出：贡献分析、accretion/dilution分析、交换比率。

## 核心原则

**"并购模型不只是数字，而是交易的逻辑验证。"**

并购建模的核心在于：理解交易结构、准确建模协同、分析增厚摊薄、评估交易价值。好的并购模型能回答"这笔交易值不值"。

## 分析步骤

### 第1步：确定交易结构

**做什么**：确定：收购方式(现金/股票/混合)、交易规模、支付溢价

**为什么**：交易结构决定融资方式和会计处理

**注意**：现金交易需要债务融资；股票交易涉及换股比例

### 第2步：建立买方模型

**做什么**：建模买方独立财务：历史+预测的利润表、资产负债表、现金流量表

**为什么**：买方独立价值是分析起点

**注意**：用简单模型，重点在合并而非独立预测

### 第3步：建立标的模型

**做什么**：建模标的独立财务：历史+预测的利润表、资产负债表、现金流量表

**为什么**：标的独立价值是交易价值的基础

**注意**：同样用简化模型；确保与买方模型假设一致

### 第4步：协同效应建模

**做什么**：量化收入协同(交叉销售)和成本协同(裁员、采购优化)

**为什么**：协同效应是并购的核心理由，支撑溢价

**注意**：成本协同更确定；收入协同更乐观；分年实现

### 第5步：交易融资建模

**做什么**：建模融资结构：现金部分(债务+手头现金)、股票部分(增发股数)

**为什么**：融资影响合并后资本结构和EPS

**注意**：债务融资增加利息支出；股票融资摊薄股权

### 第6步：合并报表建模

**做什么**：合并买方和标的：收入加总、成本调整(协同)、利息新增、股数增发

**为什么**：合并报表反映交易后财务表现

**注意**：资产调整：商誉=收购价-可辨认净资产；分年摊销

### 第7步：增厚/摊薄分析

**做什么**：比较合并后EPS vs 买方独立EPS，判断 accretion(增厚)或 dilution(摊薄)

**为什么**：这是投委会最关心的指标：EPS增厚还是摊薄？

**注意**：第一年EPS增厚20%是好交易；如果摊薄，需要解释何时转正

## 协同效应类型

### 成本协同

- 人员冗余减少
- 采购规模效应
- 办公场所整合
- IT系统合并
- 供应链优化

### 收入协同

- 交叉销售
- 渠道扩展
- 产品互补
- 客户共享
- 市场扩张

## 增厚/摊薄分析

### 影响因素

- 收购价格
- 融资方式
- 协同效应
- 税率
- 股权摊薄

### 分析框架

| 因素 | 增厚影响 | 摊薄影响 |
|------|----------|----------|
| 低收购价 | ✓ | |
| 高协同 | ✓ | |
| 债务融资 | | ✓(利息) |
| 股票融资 | | ✓(摊薄) |

## 输出检查清单

并购模型应该包括：
- [ ] 买方和标的独立模型
- [ ] 协同效应分析
- [ ] 融资结构
- [ ] 合并报表
- [ ] 增厚/摊薄分析
- [ ] 交换比率
- [ ] 敏感性分析
- [ ] 交易总结

## 关键原则总结

1. **结构驱动一切** - 交易结构决定分析框架
2. **协同要量化** - 模糊的协同没有价值
3. **假设要合理** - 协同假设要保守
4. **增厚摊薄是关键** - 这是投委会最关心的
5. **敏感性分析必须** - 交易对假设敏感
6. **三表必须平衡** - 合并报表也要平衡
7. **简洁优于复杂** - 复杂模型容易出错

## 概述

Pitch deck是投行的门面。核心原则很简单：**30分钟讲完故事，赢得项目**。每一页都有目的：吸引注意、建立信任、展示价值、促成交易。

好的pitch deck不只是堆数据，而是讲一个引人入胜的故事。

## 分析步骤

### 第1步：确定故事主线
**做什么**：明确交易的核心故事：为什么是现在？为什么是我们？为什么这公司？
**为什么**：故事是pitch的灵魂。没有故事的deck是数据堆砌
**注意**：故事主线：市场机会 → 公司优势 → 交易价值 → 我们的团队

### 第2步：设计结构大纲
**做什么**：规划30-40页的结构：市场(5-8页)、公司(8-12页)、交易(8-12页)、团队(3-5页)
**为什么**：结构决定逻辑流。好的结构让故事自然展开
**注意**：标准结构：概述 → 市场 → 公司 → 财务 → 交易 → 团队 → 附录

### 第3步：制作市场页
**做什么**：展示市场规模、增长、趋势、驱动因素。用图表可视化
**为什么**：大市场有大机会。投资人先看市场，再看公司
**注意**：TAM/SAM/SOM框架；用权威数据(麦肯锡、Gartner)

### 第4步：制作公司页
**做什么**：展示公司概况、产品/服务、竞争优势、客户、财务表现
**为什么**：证明公司是行业中的优质标的
**注意**：竞争优势用表格对比；客户logo墙增加可信度

### 第5步：制作交易页
**做什么**：展示交易结构、定价、协同效应、增厚/摊薄分析
**为什么**：交易页是核心论证，证明交易价值
**注意**：用敏感性分析展示不同情景；强调最乐观但有理的情景

### 第6步：设计和格式化
**做什么**：统一字体、颜色、图表风格；确保对齐、留白、视觉层次
**为什么**：专业的外观传递专业的能力。格式错误=不专业
**注意**：用模板确保一致性；投行标准：Times New Roman、蓝灰色系

### 第7步：质量检查
**做什么**：检查：数据正确、拼写无误、图表清晰、逻辑连贯、没有格式错误
**为什么**：一个小错误可能毁掉整个pitch
**注意**：找人通读；打印版检查；用检查清单

1. **讲故事** - 30分钟讲完故事，赢得项目

                fullDocumentation: `# 投委会备忘录

## 概述

IC Memo是私募股权的核心决策文档。核心原则很简单：**投资之前，必须说服投委会**。

IC Memo全面分析投资机会、风险、回报。写清楚为什么投、为什么现在投、多少钱、怎么赚钱、什么风险。

## 核心原则

**"IC Memo不是推销材料，而是决策支持文档。"**

IC Memo的核心在于：清晰的投资论点、全面的风险分析、合理的回报预期、明确的建议。好的IC Memo帮助投委会做出知情决策。

## 分析步骤

### 第1步：确定投资论点

**做什么**：提炼核心投资论点：为什么这家公司？为什么是这个价格？

**为什么**：论点是IC Memo的灵魂。没有论点的memo没有说服力

**注意**：论点要简洁：5-10句话说清核心逻辑

### 第2步：公司概述

**做什么**：描述公司：业务、产品、市场、历史、股权结构

**为什么**：IC成员可能不了解这个行业或公司，需要背景

**注意**：1-2页足够；重点在投资机会而非公司史

### 第3步：市场分析

**做什么**：分析市场规模、增长、趋势、竞争格局

**为什么**：大市场有大退出机会。市场是投资的基础

**注意**：用数据说话；引用权威来源；关注增长驱动力

### 第4步：投资亮点

**做什么**：列出3-5个关键投资亮点：为什么这家公司特别？

**为什么**：亮点是投资的核心理由，是区别于其他机会的关键

**注意**：每个亮点要具体：有数据、有证据；避免泛泛而谈

### 第5步：财务分析

**做什么**：展示历史财务、预测、估值、回报分析(IRR/MOIC)

**为什么**：财务是投资决策的基础。数字验证论点

**注意**：用图表展示趋势；用敏感性分析展示区间

### 第6步：风险分析

**做什么**：识别并评估主要风险：市场、运营、财务、退出

**为什么**：IC成员必须了解风险才能做出知情决策

**注意**：不要隐藏风险；对每个风险给出缓释措施

### 第7步：退出策略

**做什么**：分析退出选项：IPO、战略出售、同业出售、次级收购

**为什么**：私募股权必须退出。没有退出策略就没有回报

**注意**：分析过往类似交易；评估当前市场环境

### 第8步：团队背景

**做什么**：介绍管理团队：背景、经验、过往业绩

## 概述

财务规划是财富管理的核心。核心原则很简单：**不是卖产品，而是帮助客户达成人生目标**。

子女教育、退休、财富传承。好的财务规划全面、个性化、可执行。

## 核心原则

**"财务规划是关于人生，而不只是金钱。"**

财务规划的核心在于：了解客户、明确目标、全面规划、定期调整。好的财务规划帮助客户实现人生目标。

## 分析步骤

### 第1步：了解客户情况

**做什么**：收集：年龄、家庭、职业、收入、支出、资产、负债、保险、目标

**为什么**：不了解客户就无法制定适合的规划

**注意**：用结构化问卷；注意客户口头表述vs实际数字的差异

### 第2步：确定财务目标

**做什么**：明确短期(1-3年)、中期(3-10年)、长期(10年以上)目标

**为什么**：没有目标就没有方向。目标是规划的终点

**注意**：目标要SMART：具体、可衡量、可达成、相关、有时限

### 第3步：分析当前状况

**做什么**：计算：净资产、现金流、储蓄率、保险覆盖、风险承受能力

**为什么**：了解现状才能规划未来

**注意**：净资产=总资产-总负债；现金流=收入-支出；储蓄率=储蓄/收入

### 第4步：设计资产配置

**做什么**：根据风险承受能力和时间 horizon 配置股票/债券/现金/另类

**为什么**：资产配置决定90%的回报波动

**注意**：年轻客户多股票；临近退休多债券；定期rebalance

### 第5步：规划退休

**做什么**：计算退休需求：退休年龄、预期寿命、退休支出、社保/养老金缺口

**为什么**：退休是最大的财务目标，需要提前规划

**注意**：假设寿命到90岁；退休支出=当前支出×70-80%

### 第6步：税务优化

**做什么**：识别节税机会：递延账户、税收优惠投资、损失收割、捐赠

**为什么**：省下的税就是赚到的钱。税务优化增加净回报

**注意**：充分利用401k/IRA等递延账户；考虑muni bond免税

### 第7步：风险管理

**做什么**：评估风险：人身、健康、财产、责任。建议保险方案

**为什么**：风险事件可能毁掉多年积累。保险是风险管理的核心

**注意**：人寿保险=年收入的10倍；残疾保险很重要但常被忽视

### 第8步：遗产规划

**做什么**：规划财富传承：遗嘱、信托、赠与、慈善、税务

**为什么**：遗产规划确保财富按意愿传承，减少税务和纠纷

**注意**：美国遗产免税额(2024)是1360万；超出生前规划

### 第9步：实施和监控

**做什么**：制定实施计划，设置定期检查(至少每年)，根据变化调整

**为什么**：规划的价值在于执行。定期调整确保规划保持相关

**注意**：每年review；重大人生事件(结婚/生子/换工作)时review

## 关键财务指标

### 净资产

净资产 = 总资产 - 总负债

### 现金流

现金流 = 收入 - 支出

### 储蓄率

储蓄率 = 储蓄 / 收入

### 风险承受能力

基于年龄、收入、资产、性格、时间 horizon

## 输出检查清单

财务规划应该包括：

- [ ] 资产配置方案
- [ ] 退休规划
- [ ] 税务优化建议
- [ ] 风险管理方案
- [ ] 遗产规划
- [ ] 实施计划
- [ ] 定期review安排

## 关键原则总结

1. **客户为中心** - 规划服务于客户目标
2. **全面规划** - 考虑所有财务方面
3. **个性化** - 每个客户都不同
4. **可执行** - 规划要落地
5. **定期调整** - 人生在变化
6. **长期视角** - 关注长期目标
7. **专业诚信** - 客户利益第一

## 概述

总账对账是月结的核心步骤。核心原则很简单：**确保总账与子系统一致**。

对账不平可能指示：记录遗漏、时间差异、错误分类、甚至欺诈。

## 核心原则

**"对账不是形式，而是财务准确性的保障。"**

总账对账的核心在于：识别差异、分析原因、调整记录、预防再犯。好的对账流程确保财务报表准确可信。

## 分析步骤

### 第1步：识别需要对账的账户

**做什么**：列出需要对账的账户：银行、应收账款、应付账款、存货、信用卡、贷款

**为什么**：不是所有账户都需要对账，但重要账户必须对

**注意**：余额大、交易频繁的账户优先

### 第2步：获取对账单

**做什么**：从外部获取对账单：银行对账单、信用卡账单、供应商对账单

**为什么**：对账单是独立验证，最可靠

**注意**：电子对账单可直接导入；注意截止日可能差异

### 第3步：运行试算表

**做什么**：从总账导出试算表：所有账户的余额和交易明细

**为什么**：试算表是对账的起点

**注意**：确保试算表平衡(借方=贷方)后再对账

### 第4步：逐项核对

**做什么**：逐项核对总账余额 vs 对账单余额，识别差异

**为什么**：差异可能指示错误或遗漏

**注意**：用对账模板；先核对金额，再核对明细

### 第5步：调查差异

**做什么**：分析差异原因：时间差异、记录遗漏、错误分类、银行费用、NSF支票

**为什么**：找到根本原因才能修复并预防

**注意**：常见差异：未兑现支票、银行费用、存入未登账

### 第6步：编制调整分录

**做什么**：对必要的差异编制调整分录，更新总账

**为什么**：调整分录确保总账反映实际

**注意**：调整分录需要审批；保持审计轨迹

### 第7步：完成对账

**做什么**：确认总账余额与对账单一致，签署对账表

**为什么**：签署是对账完成的证明，责任明确

**注意**：留存对账文件备审计；每月对账不要跳过

## 常见差异类型

### 时间差异

- 未兑现支票
- 在途存款
- 银行已记企业未记
- 企业已记银行未记

### 错误差异

- 记录遗漏
- 金额错误
- 分类错误
- 重复记录

### 银行费用

- 月费
- 交易费
- 透支费
- NSF支票费

## 输出检查清单

对账完成后：
- [ ] 所有重要账户已对账
- [ ] 差异已识别
- [ ] 差异已调查
- [ ] 调整分录已编制
- [ ] 总账已更新
- [ ] 对账表已签署
- [ ] 文件已留存

## 关键原则总结

1. **重要账户优先** - 余额大、交易频繁的优先
2. **独立验证** - 用外部对账单验证
3. **及时对账** - 不要跳过任何月份
4. **完整调查** - 找到差异根本原因
5. **文档化** - 留存所有对账文件
6. **预防再犯** - 改进流程减少差异
7. **责任明确** - 签署确认

## 概述

KYC（Know Your Customer）是合规的基础。核心原则很简单：**了解你的客户，才能防止洗钱和欺诈**。

KYC包括身份验证、风险评估、受益所有人识别等。

## 核心原则

**"KYC不是形式，而是合规的第一道防线。"**

KYC的核心在于：验证身份、识别风险、筛查制裁、持续监控。好的KYC流程保护机构免受洗钱和欺诈风险。

## 分析步骤

### 第1步：收集KYC文档

**做什么**：收集：身份证明(护照/驾照)、地址证明(水电账单)、公司文档(营业执照/章程)

**为什么**：文档是验证客户身份的基础

**注意**：文档必须有效(未过期)；复印件需要认证

### 第2步：验证身份

**做什么**：验证：姓名、出生日期、地址、国籍与文档一致

**为什么**：身份验证确保客户是真实存在的人/公司

**注意**：用权威数据库验证；检查文档防伪特征

### 第3步：识别受益所有人

**做什么**：对于公司客户，识别最终受益所有人(UBO)：持股25%以上的个人

**为什么**：洗钱者常利用空壳公司。UBO识别穿透到实际控制人

**注意**：追溯到自然人；复杂的持股结构需要特别关注

### 第4步：评估风险等级

**做什么**：评估客户风险：低/中/高风险。考虑：国家、行业、产品、渠道、PEP

**为什么**：风险等级决定尽职调查的深度和后续监控的频率

**注意**：高风险：政治人物、现金业务、高风险国家；低风险：上市公司、受监管行业

### 第5步：筛查制裁名单

**做什么**：筛查客户和UBO是否在制裁名单、黑名单、PEP名单上

**为什么**：与受制裁方交易可能面临严重法律风险

**注意**：用专业筛查工具；定期re-screen(至少每年)

### 第6步：创建KYC档案

**做什么**：整理所有KYC信息，创建客户档案，记录验证过程和结论

**为什么**：KYC档案是合规审计的证据

**注意**：留存所有文档副本；记录验证人和日期；机密存储

### 第7步：持续监控

**做什么**：定期更新KYC信息，监控客户行为变化，触发事件时重新评估

**为什么**：客户风险可能变化。持续监控确保持续合规

**注意**：高风险客户至少每年review；重大变化(董事变更、业务变化)时触发review

## 风险因素

### 高风险指标

- 高风险国家/地区
- 政治公众人物(PEP)
- 现金密集业务
- 复杂股权结构
- 空壳公司

### 低风险指标

- 上市公司
- 受监管行业
- 知名金融机构
- 稳定业务历史

## 输出检查清单

KYC完成后：
- [ ] 身份文档已收集
- [ ] 身份已验证
- [ ] UBO已识别
- [ ] 风险等级已评估
- [ ] 制裁名单已筛查
- [ ] KYC档案已创建
- [ ] 监控计划已建立

## 关键原则总结

1. **验证要彻底** - 不留任何疑问
2. **穿透到自然人** - 不要停在空壳公司
3. **风险评估客观** - 基于事实而非感觉
4. **制裁筛查必须** - 这是最重要的检查
5. **文档要完整** - 审计需要证据
6. **持续监控** - 风险会变化
7. **保密第一** - KYC信息高度敏感

## 概述

首次覆盖是分析师最重要的工作。核心原则很简单：**建立对公司的理解框架，给出长期投资观点**。

好的首次报告成为后续所有分析的基石。

## 分析步骤

### 第1步：行业分析

**做什么**：分析行业规模、增长、趋势、竞争格局、驱动因素

**为什么**：公司是行业的一部分，行业分析提供背景

**注意**：用五力分析；关注结构性变化

### 第2步：公司概况

**做什么**：描述公司历史、业务模式、产品/服务、市场定位

**为什么**：读者需要了解公司是做什么的

**注意**：简洁明了，1-2页足够

### 第3步：竞争优势分析

**做什么**：识别公司的护城河：品牌、技术、规模、网络、成本、监管

**为什么**：竞争优势决定长期盈利能力

**注意**：用对比表展示vs竞争对手

### 第4步：财务分析

**做什么**：分析历史3-5年财务：增长、利润率、ROIC、现金流

**为什么**：财务表现验证战略执行

**注意**：用图表可视化趋势

### 第5步：建立财务模型

**做什么**：建立5年预测模型：收入增长、利润率、资本支出、折旧

**为什么**：模型是估值基础

**注意**：假设要有依据；做敏感性分析

### 第6步：估值分析

**做什么**：用多种方法估值：DCF、Comps、 precedent transactions

**为什么**：多种方法交叉验证，增加可信度

**注意**：给出目标价区间而非单一点

### 第7步：投资论点

**做什么**：提炼3-5个关键投资论点：看多/看空理由

**为什么**：论点是报告的灵魂

**注意**：每个论点要有数据支撑

### 第8步：风险因素

**做什么**：识别主要风险：行业、公司、财务、估值

**为什么**：投资必须考虑风险

**注意**：不要隐藏风险；风险与回报平衡

### 第9步：给出评级和目标价

**做什么**：基于分析给出买入/持有/卖出评级和12个月目标价

**为什么**：这是客户最关心的

**注意**：说明评级定义；解释目标价假设

## 关键原则

1. **全面深入** - 首次报告要全面
2. **框架清晰** - 建立分析框架
3. **论点明确** - 给出清晰观点
4. **数据支撑** - 用数据验证
5. **估值合理** - 多方法交叉验证
6. **风险透明** - 不隐藏风险
7. **可操作** - 给出明确建议

## 概述

模型需要持续更新。核心原则很简单：**新信息来了就要更新模型**。

财报、指引、行业数据、宏观变化。保持模型更新才能给出准确的估值和建议。

## 分析步骤

### 第1步：识别更新触发

**做什么**：识别需要更新的触发事件：财报、指引、行业报告、宏观变化

**为什么**：不是所有信息都需要更新模型

**注意**：财报和指引必须更新；行业数据视重要性决定

### 第2步：收集新数据

**做什么**：收集更新的数据：实际值、新指引、修订预期

**为什么**：准确数据是模型准确的基础

**注意**：用官方来源；注意数据定义一致性

### 第3步：更新历史数据

**做什么**：将最新实际数据输入模型，替换之前的预测

**为什么**：历史数据是预测的基础

**注意**：确保数据录入正确；检查公式仍然有效

### 第4步：调整预测假设

**做什么**：根据新信息调整预测假设：增长率、利润率、资本支出

**为什么**：新信息改变预期，需要更新假设

**注意**：假设要有依据；保持内部一致性

### 第5步：验证模型平衡

**做什么**：检查三表平衡、公式正确性、逻辑一致性

**为什么**：更新可能引入错误

**注意**：运行检查：资产=负债+权益、现金流平衡

### 第6步：更新估值

**做什么**：重新计算DCF、Comps，更新目标价

**为什么**：模型变化导致估值变化

**注意**：对比新旧估值，解释变化原因

### 第7步：评估投资建议

**做什么**：基于新估值评估是否需要调整投资建议

**为什么**：模型更新可能改变投资论点

**注意**：考虑股价变化；如果目标价变化<5%可能不需要行动

## 关键原则

1. **及时更新** - 新信息立即更新
2. **数据准确** - 用官方来源
3. **保持平衡** - 三表必须平衡
4. **解释变化** - 说明为什么变化
5. **评估影响** - 评估是否需要调整建议
6. **保持一致** - 假设内部一致
7. **验证公式** - 检查公式仍然有效

## 概述

投资不是一次性的决定。核心原则很简单：**论点需要持续验证和调整**。

**为什么**：催化剂是论点验证的里程碑

**注意**：每个催化剂要有时间表和成功标准

## 概述

行业概览是自上而下分析的基础。核心原则很简单：**先选行业，再选公司**。

好的行业概览帮你识别哪些行业有投资机会，哪些要回避。

## 分析步骤

### 第1步：定义行业边界

**做什么**：明确行业范围：包括哪些子行业、公司、产品

**为什么**：清晰的边界才能做有意义的分析

**注意**：用GICS或ICB标准行业分类

### 第2步：分析市场规模和增长

**做什么**：估算TAM/SAM/SOM、历史增长、未来增长预期

**为什么**：市场规模和增长决定投资机会

**注意**：引用权威来源(麦肯锡、Gartner)；关注CAGR

### 第3步：识别增长驱动因素

**做什么**：识别行业增长的驱动因素：技术、人口、政策、消费习惯

**为什么**：理解驱动因素预判未来趋势

**注意**：区分周期性驱动和结构性驱动

### 第4步：分析竞争格局

**做什么**：分析市场份额集中度、竞争强度、进入壁垒

**为什么**：竞争格局影响行业盈利能力

**注意**：用CR3/CR5衡量集中度；波特五力分析

### 第5步：分析行业周期

**做什么**：判断行业所处阶段：成长期/成熟期/衰退期

**为什么**：不同阶段有不同的投资策略

**注意**：成长期：关注增长；成熟期：关注盈利；衰退期：关注现金流

### 第6步：识别行业风险

**做什么**：识别行业面临的威胁：技术颠覆、政策变化、替代品

**为什么**：风险评估是投资决策的基础

**注意**：最危险的是"看不见"的风险

### 第7步：给出行业观点

**做什么**：总结行业观点：积极/中性/谨慎，推荐关注的子行业和公司

**为什么**：行业概览的目的是指导投资

**注意**：观点要明确；推荐要具体

## 关键原则

1. **自上而下** - 先行业后公司
2. **数据驱动** - 用权威数据
3. **结构清晰** - 明确行业边界
4. **竞争分析** - 理解竞争格局
5. **周期判断** - 识别所处阶段
6. **风险意识** - 识别潜在威胁
7. **观点明确** - 给出明确建议

## 概述

投资想法是分析师的生命线。核心原则很简单：**没有好想法，再好的分析也没用**。

想法来自多个渠道：新闻、数据、会议、网络。

## 分析步骤

### 第1步：建立想法来源

**做什么**：建立多渠道想法来源：新闻扫描、数据筛选、卖方报告、行业会议

**为什么**：想法来源多样化保证想法流不断

**注意**：每天固定时间扫描；建立RSS订阅

### 第2步：快速筛选

**做什么**：快速评估每个想法的潜力：市场规模、催化剂、估值

**为什么**：时间有限，不能深入研究每个想法

**注意**：30秒判断：值得花时间吗？

### 第3步：初步研究

**做什么**：对通过筛选的想法做初步研究：业务模式、竞争、财务

**为什么**：初步研究验证想法的合理性

**注意**：花1-2小时；看年报和最新财报

### 第4步：建立投资论点

**做什么**：为有潜力的想法建立投资论点：为什么这只股票会涨？

**为什么**：清晰的论点是深入研究的基础

## 概述

好的PPT模板让你事半功倍。核心原则很简单：**一次性设计，长期受益**。

专业模板确保所有输出一致，节省时间。

## 分析步骤

### 第1步：确定模板用途

**做什么**：明确模板用途：行业报告类型、客户群体、输出频率

**为什么**：不同用途需要不同模板

**注意**：投行用蓝灰色系；研究用简洁风格

### 第2步：设计母版

**做什么**：设计母版幻灯片：标题布局、内容布局、图表布局

**为什么**：母版决定整体风格

**注意**：包含5-10种布局即可；不要太多

### 第3步：定义颜色方案

**做什么**：定义主色、辅色、强调色、背景色、文字色

**为什么**：颜色方案统一视觉效果

**注意**：使用企业色系；确保对比度足够

### 第4步：定义字体方案

**做什么**：定义标题字体、正文字体、字号、行距

**为什么**：字体方案决定可读性

**注意**：标题用粗体；正文用常规；字号不小于18pt

### 第5步：设计图表模板

**做什么**：设计常用图表模板：柱状图、折线图、饼图、矩阵、瀑布图

**为什么**：图表模板加速制作

**注意**：设置默认颜色；添加图例说明

### 第6步：添加自动化元素

**做什么**：添加页码、日期、Logo、版权等自动化元素

**为什么**：自动化减少手动工作

**注意**：用母版实现；确保所有slide都有

### 第7步：测试和优化

**做什么**：用实际内容测试模板，收集反馈并优化

**为什么**：模板要在实际使用中验证

**注意**：让同事试用；收集常见问题并修复

## 关键原则

1. **一致性第一** - 所有输出一致
2. **简洁优雅** - 不要过度设计
3. **可读性强** - 字号足够大
4. **颜色协调** - 统一色系
5. **布局清晰** - 信息层次分明
6. **易于使用** - 便于快速填充
7. **持续优化** - 根据反馈改进

## 概述

质量控制在投行至关重要。核心原则很简单：**一个错误可能毁掉整个交易**。

QC是发出去前的最后一道防线。

## 分析步骤

### 第1步：数据准确性检查

**做什么**：检查所有数字：来源、计算、一致性

**为什么**：数字错误是最致命的

**注意**：交叉验证；用公式

### 第2步：拼写和语法检查

**做什么**：检查拼写、语法、标点、专业术语

**为什么**：拼写错误显得不专业

**注意**：用拼写检查工具；人工检查重点页

### 第3步：格式一致性检查

**做什么**：检查格式：字体、颜色、对齐、留白

**为什么**：格式不一致显得不专业

**注意**：用模板；设置样式

### 第4步：逻辑连贯性检查

**做什么**：检查故事线：逻辑是否通顺？论点是否支撑结论？

**为什么**：逻辑漏洞是致命的

**注意**：从读者的角度看；让没背景的人看

### 第5步：视觉呈现检查

**做什么**：检查视觉效果：图表清晰、可读、美观

**为什么**：好的视觉增强说服力

**注意**：确保投影可读；颜色对比度足够

### 第6步：链接和引用检查

**做什么**：检查所有链接、引用、附录编号

**为什么**：断链接很烦人

**注意**：点击所有链接；验证所有引用

### 第7步：创建QC报告

**做什么**：汇总所有发现的问题，按严重程度分类

**为什么**：QC报告帮助修复和预防

**注意**：用分类：致命/警告/提示

## QC检查清单

- [ ] 数据准确
- [ ] 拼写无误
- [ ] 格式一致
- [ ] 逻辑通顺
- [ ] 视觉清晰
- [ ] 链接有效
- [ ] 引用正确

## 关键原则

1. **细致入微** - 不放过任何细节
2. **交叉验证** - 多角度检查
3. **客观公正** - 严格标准
4. **问题分类** - 按严重程度
5. **可操作** - 给出修复建议
6. **记录详细** - QC报告详细
7. **持续改进** - 从错误学习

                fullDocumentation: `# 信息备忘录(CIM)

## 概述

CIM（Confidential Information Memorandum）是卖方投行的核心文档。核心原则很简单：**用最好的方式展示公司**。

CIM包含公司概况、市场、财务、运营等所有买家需要的信息。

## 分析步骤

### 第1步：确定CIM结构

**做什么**：规划CIM章节：执行摘要、公司、市场、产品、客户、财务、运营

**为什么**：结构决定叙事流

**注意**：标准结构：概述→公司→市场→财务→运营→附录

### 第2步：撰写执行摘要

**做什么**：撰写2-3页执行摘要：投资亮点、关键数据、交易理由

**为什么**：执行摘要是最重要的部分，很多买家只看这个

**注意**：突出数字：收入、增长率、利润率；用图表

### 第3步：公司概述

**做什么**：描述公司：历史、业务模式、组织架构、里程碑

**为什么**：买家需要了解卖什么

**注意**：简洁；突出成长轨迹

### 第4步：市场分析

**做什么**：分析市场：规模、增长、趋势、竞争

**为什么**：市场机会是价值的关键

**注意**：用权威数据；突出增长

### 第5步：产品和服务

**做什么**：描述产品/服务：组合、差异化、定价、客户

**为什么**：产品是价值基础

**注意**：用图表展示；突出独特性

### 第6步：财务分析

**做什么**：展示财务：历史5年+预测3年、关键比率、驱动因素

**为什么**：财务数据是定价基础

**注意**：用图表趋势；解释异常

### 第7步：运营分析

**做什么**：分析运营：产能、效率、成本、供应链

**为什么**：运营洞察帮助买家理解整合潜力

**注意**：突出可改进领域

### 第8步：管理层和团队

**做什么**：介绍团队：背景、经验、留任计划

**为什么**：团队是持续经营的关键

**注意**：突出行业经验；说明留任安排

### 第9步：交易理由

**做什么**：说明为什么卖：战略调整、资本需求、 succession

**为什么**：买家想知道为什么卖

**注意**：诚实；不要过度解释

### 第10步：保密和质量检查

**做什么**：添加保密声明；全面QC数据、拼写、格式

**为什么**：CIM是机密；错误破坏可信度

**注意**：每个印上"机密"；用检查清单QC

## 关键原则

1. **突出亮点** - 强调投资价值
2. **数据支撑** - 用数据验证
3. **诚实透明** - 不夸大不隐瞒
4. **保密第一** - 严格保密

                fullDocumentation: `# 尽职调查清单

## 概述

尽职调查(Due Diligence)是私募股权的核心。核心原则很简单：**清单确保不遗漏任何风险**。

好的清单是多年经验积累的结果。

## 分析步骤

### 第1步：确定调查范围
**做什么**：确定调查类型和深度：商业、财务、法律、税务、运营
**为什么**：不同交易需要不同调查
**注意**：成长股权侧重商业；收购侧重全面

### 第2步：商业尽职调查
**做什么**：调查：市场、竞争、产品、客户、团队、战略
**为什么**：商业DD验证投资论点
**注意**：访谈客户；访谈竞争对手

### 第3步：财务尽职调查
**做什么**：调查：历史财务、会计政策、应收应付、存货、资本支出
**为什么**：财务DD验证数字真实性
**注意**：检查审计报告；验证现金流

### 第4步：法律尽职调查
**做什么**：调查：公司架构、合同、诉讼、知识产权、合规
**为什么**：法律DD识别法律风险
**注意**：律师主导；重点检查重大合同

### 第5步：税务尽职调查
**做什么**：调查：税务申报、税务风险、税务优化机会
**为什么**：税务DD影响交易结构和价值
**注意**：检查3年申报；识别潜在责任

### 第6步：运营尽职调查
**做什么**：调查：生产、供应链、IT系统、人力资源、EHS
**为什么**：运营DD识别运营风险和改进机会
**注意**：现场访问；访谈运营团队

### 第7步：组织发现
**做什么**：汇总所有发现，分类：deal killer、风险、机会
**为什么**：组织发现便于决策
**注意**：用红绿灯系统：红/黄/绿

### 第8步：提出条件
**做什么**：基于DD发现提出交割条件：赔偿、 Escrow、调整
**为什么**：DD发现应该反映在交易条款中
**注意**：重大风险需要赔偿；不确定性需要escrow

## 关键原则

1. **清单确保全面** - 确保不遗漏任何风险
2. **范围匹配** - 不同交易需要不同调查
3. **商业验证论点** - 访谈客户；访谈竞争对手
4. **财务验证数字** - 检查审计报告；验证现金流
5. **法律识别风险** - 律师主导；重点检查重大合同
6. **税务影响价值** - 检查3年申报；识别潜在责任
7. **运营识别改进** - 现场访问；访谈运营团队
8. **红绿灯系统** - 红/黄/绿分类
9. **反映在条款** - DD发现应该反映在交易条款中

## 概述

买家名单是卖方投行的基础工作。核心原则很简单：**找到可能买这家公司的所有人**。

名单包括战略买家和财务买家。

## 分析步骤

### 第1步：确定筛选标准
**做什么**：确定筛选条件：行业、地区、规模、战略契合度、财务能力
**为什么**：标准决定名单质量
**注意**：不要太窄(名单太小)或太宽(噪音太多)

### 第2步：识别战略买家
**做什么**：识别同业或相关行业的上市公司和私企
**为什么**：战略买家通常支付更高溢价
**注意**：看竞争对手、供应商、客户的上下游

### 第3步：识别财务买家
**做什么**：识别PE/VC基金：专注行业、规模范围、阶段偏好
**为什么**：财务买家决策快、条件少
**注意**：用PE数据库；关注基金的可用资本

### 第4步：收集联系信息
**做什么**：收集每个买家的关键联系人：CEO、CFO、BD负责人
**为什么**：联系到对的人很重要
**注意**：用LinkedIn、公司网站、行业网络

### 第5步：评估买家兴趣
**做什么**：评估每个潜在买家的可能兴趣：高/中/低
**为什么**：兴趣评估帮助优先排序
**注意**：历史收购记录、战略匹配、财务能力

### 第6步：创建名单表格
**做什么**：创建表格：公司名称、类型、联系人、兴趣、优先级
**为什么**：表格便于跟踪和管理
**注意**：用颜色编码优先级；添加状态列

### 第7步：准备接触材料
**做什么**：为每个买家准备定制化的接触材料
**为什么**：定制化增加成功率
**注意**：强调与该买家相关的协同效应

## 关键原则

1. **找到所有人** - 找到可能买这家公司的所有人
2. **标准质量** - 不要太窄或太宽
3. **战略买家** - 通常支付更高溢价
4. **财务买家** - 决策快、条件少
5. **联系对人** - CEO、CFO、BD负责人
6. **兴趣评估** - 高/中/低优先排序
7. **表格管理** - 用颜色编码优先级
8. **定制化** - 强调协同效应

## 概述

数据包是给买家的数据集合。核心原则很简单：**好的数据包加速尽职调查**。

包括财务、运营、市场、法律数据。

## 分析步骤

### 第1步：确定数据范围
**做什么**：确定包含的数据类别：财务、运营、市场、法律、其他
**为什么**：范围决定数据包大小
**注意**：CIM提到的数据都要包含

### 第2步：收集财务数据
**做什么**：收集：审计报告、管理账、预算、KPI、合同
**为什么**：财务数据是买家最关心的
**注意**：提供3-5年历史；用Excel格式

### 第3步：收集运营数据
**做什么**：收集：产能、产量、客户列表、供应商列表、员工数据
**为什么**：运营数据帮助买家理解业务
**注意**：客户/供应商可以匿名

### 第4步：收集市场数据
**做什么**：收集：市场报告、竞争分析、研究、行业数据
**为什么**：市场数据支持投资论点
**注意**：用第三方权威报告

### 第5步：整理和命名
**做什么**：整理文件、统一命名、建立目录结构
**为什么**：好的组织让数据包好用
**注意**：用清晰的文件夹结构；文件名包含日期

### 第6步：添加说明文档
**做什么**：添加README：数据包内容、文件说明、注意事项
**为什么**：说明文档帮助买家快速上手
**注意**：列出所有文件；说明单位

### 第7步：上传和分发
**做什么**：上传到数据室，设置访问权限，通知买家
**为什么**：安全分发很重要
**注意**：分级权限；记录下载

## 概述

时间有限，机会很多。核心原则很简单：**快速筛选聚焦最好的机会**。

筛选标准：策略契合、回报潜力、可行性。

## 分析步骤

### 第1步：建立筛选框架
**做什么**：建立筛选维度：策略、财务、运营、风险
**为什么**：框架确保一致性
**注意**：每个维度设置pass/fail标准

### 第2步：快速信息收集
**做什么**：快速收集关键信息：行业、规模、增长、盈利、位置
**为什么**：基本信息足够初筛
**注意**：用公开信息；不要深入DD

### 第3步：策略契合评估
**做什么**：评估：行业契合？规模合适？地域合适？阶段合适？
**为什么**：策略不契合pass
**注意**：严格按投资标准

### 第4步：财务潜力评估
**做什么**：评估：收入规模、增长、利润率、现金流、杠杆能力

## 概述

Unit economics揭示商业模式真相。核心原则很简单：**整体盈利可能掩盖单位亏损**。

关键指标：CAC、LTV、payback period、margin。

## 分析步骤

### 第1步：定义单位
**做什么**：定义最小经济单位：客户、订单、门店、座位
**为什么**：单位定义要合理
**注意**：SaaS用客户；零售用门店

### 第2步：计算收入单位
**做什么**：计算每单位收入：ARPU、AOV、ASP
**为什么**：单位收入是起点
**注意**：ARPU=月收入/用户数；AOV=订单总额/订单数

### 第3步：计算成本单位
**做什么**：计算每单位成本：COGS、服务成本、履约成本
**为什么**：单位成本决定盈利能力
**注意**：COGS=产品成本；服务成本=支持成本

### 第4步：计算获客成本(CAC)
**做什么**：计算CAC=营销费用/新客数量
**为什么**：CAC决定增长成本
**注意**：按渠道计算；关注LTV/CAC比率

### 第5步：计算客户价值(LTV)
**做什么**：计算LTV=ARPU×毛利率×客户寿命
**为什么**：LTV是客户终身价值
**注意**：客户寿命=1/流失率

### 第6步：计算回收期
**做什么**：计算回收期=CAC/(ARPU×毛利率)
**为什么**：回收期越短越好
**注意**：理想<12个月；容忍<24个月

### 第7步：分析边际贡献
**做什么**：计算每单位边际贡献=收入-可变成本
**为什么**：边际贡献决定规模效应
**注意**：正边际贡献+增长=规模经济

### 第8步：评估规模潜力
**做什么**：评估：单位经济是否可复制？规模后是否改善？
**为什么**：好的单位经济可规模化
**注意**：看行业标杆；问自己：1万个单位会怎样？

## 关键原则

1. **揭示真相** - 整体盈利可能掩盖单位亏损
2. **单位合理** - SaaS用客户；零售用门店
3. **ARPU/AOV** - 单位收入是起点
4. **成本决定** - 单位成本决定盈利能力
5. **CAC增长** - LTV/CAC比率
6. **LTV价值** - 客户寿命=1/流失率
7. **回收期** - 理想<12个月
8. **边际贡献** - 正边际贡献+增长=规模经济
9. **规模潜力** - 好的单位经济可规模化
`

## 概述

回报分析是PE的核心。核心原则很简单：**IRR和MOIC是终极指标**。

分析投资回报来源：增长、杠杆、倍数扩张。

## 分析步骤

### 第1步：建立现金流模型
**做什么**：建模投资期的现金流：投资、分红、退出
**为什么**：现金流是IRR的基础
**注意**：投资是负，收益是正

### 第2步：计算IRR
**做什么**：用XIRR或IRR函数计算内部收益率
**为什么**：IRR是PE标准指标
**注意**：IRR>20%是好交易；IRR>30%是优秀

### 第3步：计算MOIC
**做什么**：计算MOIC=总收益/总投资
**为什么**：MOIC是绝对倍数
**注意**：MOIC>2x是好交易；MOIC>3x是优秀

### 第4步：分解回报来源
**做什么**：分解回报：EBITDA增长、债务偿还、倍数扩张
**为什么**：理解回报来源帮助讲故事
**注意**：回报=增长+杠杆+倍数

### 第5步：建立退出情景
**做什么**：建立不同退出情景：IPO、战略出售、次级收购
**为什么**：退出方式影响回报
**注意**：战略出售通常倍数最高；IPO流动性最好

### 第6步：敏感性分析
**做什么**：测试不同假设的回报：退出倍数、增长、杠杆
**为什么**：敏感性展示风险区间
**注意**：用5×5矩阵；强调基准情景

### 第7步：制作回报bridge
**做什么**：制作回报bridge图：投资→退出收益
**为什么**：Bridge图直观展示回报来源
**注意**：从左到右：投资成本→EBITDA增长→债务偿还→退出倍数→退出价值

### 第8步：与benchmark比较
**做什么**：与基金目标、行业平均比较
**为什么**：相对位置很重要
**注意**：与基金IRR hurdle比较

## 关键原则

1. **IRR优先** - IRR是PE标准
2. **MOIC辅助** - MOIC提供绝对值
3. **回报分解** - 理解回报来源
4. **敏感性必须** - 展示风险区间
5. **退出关键** - 退出方式影响回报
6. **Bridge直观** - Bridge图展示来源
7. **相对比较** - 与benchmark比较

## 概述

投资之后工作才开始。核心原则很简单：**持续监控确保价值创造**。

监控财务表现、运营指标、风险信号。

## 分析步骤

### 第1步：建立监控框架
**做什么**：确定监控频率：月度/季度；监控内容：财务、运营、风险
**为什么**：框架决定监控工作量
**注意**：大部分公司季度监控；问题公司月度监控

### 第2步：收集财务数据
**做什么**：收集月报/季报：收入、EBITDA、现金流、Capex
**为什么**：财务数据是健康度指标
**注意**：与管理层确认；与预算比较

### 第3步：收集运营数据
**做什么**：收集KPI：客户数、留存率、转化率、产能
**为什么**：运营指标领先财务
**注意**：设置预警阈值

### 第4步：评估表现vs预算
**做什么**：比较实际vs预算，分析差异
**为什么**：预算差异指示问题或机会
**注意**：差异>10%需要解释

### 第5步：识别风险信号
**做什么**：识别风险：关键人流失、客户流失、竞争加剧、监管变化
**为什么**：早期识别风险可以干预
**注意**：建立风险信号清单；定期扫描

## 概述

PE不只是买和卖。核心原则很简单：**主动创造价值才能获得超额回报**。

价值创造计划识别机会：收入增长、利润率提升、运营优化。

## 分析步骤

### 第1步：分析当前状态
**做什么**：全面分析公司：战略、运营、财务、组织
**为什么**：了解现状才能设计改进
**注意**：用SWOT；用benchmarking

### 第2步：识别价值驱动因素
**做什么**：识别价值杠杆：价格、销量、成本、资本效率
**为什么**：价值驱动聚焦努力
**注意**：用杜邦分析；用价值树

### 第3步：设定价值创造目标
**做什么**：设定目标：EBITDA增长、利润率提升、现金流改善
**为什么**：明确的目标指引行动
**注意**：目标要SMART；与投资论点一致

### 第4步：设计收入增长计划
**做什么**：设计收入增长：新产品、新市场、新渠道、定价优化
**为什么**：收入增长是价值主要来源
**注意**：交叉销售、追加销售、定价权

### 第5步：设计利润率提升计划
**做什么**：设计利润率提升：成本结构优化、供应链优化、自动化
**为什么**：利润率提升直接增加EBITDA
**注意**：流程优化、外包、共享服务

### 第6步：设计资本效率计划
**做什么**：设计资本效率：库存优化、应收账款管理、Capex优化
**为什么**：资本效率改善现金流和ROIC
**注意**：JIT、账期管理、Capex优先级

### 第7步：制定实施路线图
**做什么**：制定路线图：什么、谁、何时、资源、里程碑
**为什么**：路线图将计划变行动
**注意**：短期速赢+长期转型；季度里程碑

### 第8步：分配责任和资源
**做什么**：分配责任：谁负责什么？需要什么资源？
**为什么**：责任落实确保执行
**注意**：管理层负责；PE支持；必要时外部专家

### 第9步：建立衡量和跟踪
**做什么**：建立KPI、定期跟踪、季度review
**为什么**：衡量驱动执行
**注意**：每月跟踪；季度deep dive

### 第10步：调整和优化
**做什么**：根据结果调整计划
**为什么**：计划需要适应现实
**注意**：保持灵活性；学习迭代

## 概述

客户会议是财富经理的核心工作。核心原则很简单：**好的会议建立信任和关系**。

会议类型：review、规划、危机处理。

## 分析步骤

### 第1步：确定会议目的
**做什么**：明确会议目的：review、规划、教育、解决问题
**为什么**：目的决定议程
**注意**：一次会议一个主要目的

### 第2步：准备客户信息
**做什么**：复习：客户档案、投资组合、历史沟通、风险概况
**为什么**：准备显示专业和关心
**注意**：了解客户最近的生活事件

### 第3步：准备会议材料
**做什么**：准备：组合表现、市场回顾、建议方案
**为什么**：材料支撑讨论
**注意**：简洁可视化；不要过度信息

### 第4步：设定议程
**做什么**：设定议程和时间分配
**为什么**：议程让会议高效
**注意**：与客户分享议程；灵活调整

### 第5步：开场建立关系
**做什么**：闲聊：家庭、工作、生活
**为什么**：关系是信任的基础
**注意**：真诚关心；记住重要细节

### 第6步：回顾表现
**做什么**：回顾：投资组合表现、vs基准、实现的目标
**为什么**：回顾建立可信度
**注意**：诚实面对不佳表现；解释原因

### 第7步：讨论市场和变化
**做什么**：分享市场观点、经济变化、对客户的影响
**为什么**：教育增加价值
**注意**：简洁相关；不要overwhelm

### 第8步：讨论目标和变化
**做什么**：讨论：财务目标、风险承受度、生活变化
**为什么**：目标可能变化；需要定期确认
**注意**：主动询问；认真倾听

### 第9步：提出建议
**做什么**：基于讨论提出调整建议：rebalance、再配置、风险调整
**为什么**：建议体现价值
**注意**：解释为什么；获得认同

### 第10步：确认行动
**做什么**：确认下一步行动、时间表、责任
**为什么**：会议要产生行动
**注意**：发给客户会议纪要

### 第11步：跟进
**做什么**：跟进：发送感谢、执行行动、定期更新
**为什么**：跟进强化关系

9. **及时跟进** - 24小时内发感谢邮件

## 概述

市场波动会让配置偏离目标。核心原则很简单：**再平衡维持风险水平**。

再平衡也可以低买高卖。

## 分析步骤

### 第1步：确定再平衡触发
**做什么**：确定触发条件：时间(季度)或阈值(偏离5%)
**为什么**：触发规则避免过度交易
**注意**：5%阈值是常见；严格vs灵活

### 第2步：计算当前配置
**做什么**：计算各资产类别的当前权重和市值
**为什么**：了解现状
**注意**：用最新价格；包括现金

### 第3步：计算目标配置
**做什么**：计算目标配置和当前偏离
**为什么**：偏离决定交易
**注意**：偏离=当前权重-目标权重

### 第4步：确定交易方向
**做什么**：确定：卖出超配资产，买入低配资产
**为什么**：再平衡是反向操作
**注意**：卖高买低；这是纪律的优势

### 第5步：计算交易规模
**做什么**：计算每笔交易规模，考虑成本和税务
**为什么**：成本影响再平衡收益
**注意**：交易成本<预期收益；考虑税务影响

### 第6步：选择执行方法
**做什么**：选择：一次性 vs 分批；现金流入 vs 卖出
**为什么**：执行方法影响执行效果
**注意**：有新现金时用现金再平衡

### 第7步：执行交易
**做什么**：执行交易，注意价格和时机
**为什么**：执行影响结果
**注意**：用限价单；避免市场波动

### 第8步：记录和报告
**做什么**：记录再平衡操作，报告给客户
**为什么**：记录是合规要求；报告是客户服务
**注意**：解释原因；展示影响

## 关键原则

1. **触发规则** - 避免过度交易
2. **计算准确** - 用最新价格
3. **反向操作** - 卖高买低
4. **成本控制** - 交易成本<预期收益
5. **方法选择** - 有新现金时用现金再平衡

7. **记录报告** - 解释原因；展示影响
8. **纪律执行** - 纪律是再平衡的优势

## 概述

税收损失收割是免费午餐。核心原则很简单：**把亏损变成税务优势**。

卖出亏损资产抵消资本利得，降低税负。

## 分析步骤

### 第1步：识别机会
**做什么**：扫描组合找出未实现损失的头寸
**为什么**：识别机会是第一步
**注意**：年末集中；全年关注

### 第2步：计算税务影响
**做什么**：计算：损失金额、可抵消利得、预期省税
**为什么**：量化税务收益
**注意**：短期损失先抵短期利得

### 第3步：考虑wash sale规则
**做什么**：注意wash sale规则：30天内不能买回同一证券
**为什么**：违反wash sale规则失去抵扣
**注意**：30天前/后；买相似但不相同

### 第4步：寻找替代品
**做什么**：为卖出资产寻找替代品：相似但不相同
**为什么**：替代品保持市场敞口
**注意**：用sector ETF替换单股；用相似公司

### 第5步：评估影响
**做什么**：评估：交易成本、偏离度、长期影响
**为什么**：不要为了省税破坏策略
**注意**：交易成本<税务收益；保持配置

### 第6步：执行交易
**做什么**：执行卖出和买入
**为什么**：执行很重要
**注意**：同时执行减少市场风险

### 第7步：记录和跟踪
**做什么**：记录wash sale截止日期，跟踪损失使用
**为什么**：记录是合规要求
**注意**：维护wash sale日历

## 关键原则

1. **免费午餐** - 把亏损变成税务优势
2. **识别机会** - 扫描组合找出未实现损失
3. **量化收益** - 计算预期省税
4. **wash sale规则** - 30天内不能买回同一证券
5. **替代品** - 保持市场敞口
6. **评估影响** - 不要为了省税破坏策略
7. **同时执行** - 减少市场风险
8. **记录跟踪** - 维护wash sale日历

## 概述

NAV（Net Asset Value）是基金的核心指标。核心原则很简单：**NAV必须准确**。

对账确保NAV计算无误。

## 分析步骤

### 第1步：获取各系统数据
**做什么**：从投资系统、会计系统、托管行获取数据
**为什么**：多来源数据需要核对
**注意**：确保同期；货币一致

### 第2步：核对持仓
**做什么**：核对：股票数量、债券面值、衍生品头寸
**为什么**：持仓差异导致NAV差异
**注意**：逐只证券核对；注意fractional shares

### 第3步：核对价格
**做什么**：核对：收盘价、估值价、基金净值
**为什么**：价格差异影响NAV
**注意**：用一致来源；注意场外交易定价

### 第4步：核对现金
**做什么**：核对：现金余额、应收应付、待结算
**为什么**：现金是NAV重要部分
**注意**：包括待清算交易；考虑结算期

### 第5步：核对费用和收入
**做什么**：核对：管理费、业绩费、其他费用、收入
**为什么**：费用影响NAV
**注意**：计算accrual；注意payable/receivable

### 第6步：计算NAV
**做什么**：按标准公式计算NAV
**为什么**：计算验证手动正确性
**注意**：资产-负债=NAV；除以份额

### 第7步：比较和解释差异
**做什么**：比较各系统NAV，解释差异
**为什么**：差异需要解释
**注意**：小的定价差异可接受；大差异要调查

### 第8步：调整和修正
**做什么**：如必要，调整NAV
**为什么**：准确NAV是基金生命
**注意**：调整要文档；保持审计轨迹

### 第9步：报告和披露
**做什么**：报告NAV和NAV对账结果
**为什么**：透明度是监管要求
**注意**：向托管行确认；向投资者披露

1. **NAV必须准确** - NAV是基金生命
2. **多系统核对** - 投资系统、会计系统、托管行
3. **持仓核对** - 逐只证券核对
4. **价格一致** - 用一致来源

7. **差异解释** - 大差异要调查
8. **调整文档** - 保持审计轨迹
9. **透明披露** - 向托管行确认

## 概述

预算vs实际有差异很正常。核心原则很简单：**关键是要解释为什么**。

差异说明帮助管理层理解和决策。

## 分析步骤

### 第1步：计算差异
**做什么**：计算：差异金额、差异百分比、方向(有利/不利)
**为什么**：量化差异是第一步
**注意**：差异=实际-预算；%差异=差异/预算

### 第2步：确定重要性
**做什么**：确定哪些差异重要：金额大、%差异大、关键项目
**为什么**：不是所有差异都需要解释
**注意**：设定阈值：金额>$10k或%差异>5%

### 第3步：分析差异原因
**做什么**：分析原因：销量变化、价格变化、效率变化、时间差异
**为什么**：原因分析有价值
**注意**：分解差异；驱动因素分析

### 第4步：区分类型
**做什么**：区分：永久差异、临时差异、时间差异
**为什么**：不同类型不同处理
**注意**：永久差异需要调整预算；临时差异会回归

### 第5步：评估影响
**做什么**：评估对全年预测的影响
**为什么**：本月差异影响全年吗？
**注意**：更新全年预测；识别趋势

### 第6步：编写说明
**做什么**：编写差异说明：简洁、清晰、可操作
**为什么**：说明要容易理解
**注意**：三段式：发生了什么、为什么、怎么做

### 第7步：可视化
**做什么**：用图表展示差异：瀑布图、趋势图
**为什么**：图表一目了然
**注意**：突出重大差异；用颜色编码

### 第8步：提出建议
**做什么**：如有必要，提出行动建议
**为什么**：说明不只是回顾，也要前瞻
**注意**：建议要具体；负责人和时间

### 第9步：分发和跟进
**做什么**：分发给相关人员，跟踪行动
**为什么**：分发确保传达；跟进确保执行
**注意**：管理层、部门负责人、财务

## 关键原则

1. **解释为什么** - 关键是要解释为什么
2. **量化差异** - 差异金额、百分比
3. **重要性阈值** - 不是所有差异都需要解释
4. **原因分析** - 分解差异；驱动因素分析
5. **类型区分** - 永久差异 vs 临时差异

        // 全局变量存储目录信息
        var tocItems = [];

        // Markdown渲染函数
        function renderMarkdown(markdown) {
            if (!markdown) return '';

            // 清空目录
            tocItems = [];

            var html = markdown;

            // 处理代码块 ```language...```
            html = html.replace(/```(\w*)\n([\s\S]*?)```/g, function(match, lang, code) {
                return '<pre><code class="language-' + lang + '">' + escapeHtml(code.trim()) + '</code></pre>';
            });

            // 处理行内代码 `...`
            html = html.replace(/`([^`]+)`/g, '<code class="inline-code">$1</code>');

            // 处理标题 # ## ### ####，并添加id和收集目录信息
            var headingCounter = { h1: 0, h2: 0, h3: 0 };
            html = html.replace(/^#### (.*)$/gm, function(match, title) {
                headingCounter.h3++;
                var id = 'heading-' + headingCounter.h1 + '-' + headingCounter.h2 + '-' + headingCounter.h3;
                tocItems.push({ title: title, level: 4, id: id });
                return '<h4 id="' + id + '">' + title + '</h4>';
            });
            html = html.replace(/^### (.*)$/gm, function(match, title) {
                headingCounter.h2++;
                headingCounter.h3 = 0;
                var id = 'heading-' + headingCounter.h1 + '-' + headingCounter.h2;
                tocItems.push({ title: title, level: 3, id: id });
                return '<h3 id="' + id + '">' + title + '</h3>';
            });
            html = html.replace(/^## (.*)$/gm, function(match, title) {
                headingCounter.h1++;
                headingCounter.h2 = 0;
                var id = 'heading-' + headingCounter.h1;
                tocItems.push({ title: title, level: 2, id: id });
                return '<h2 id="' + id + '">' + title + '</h2>';
            });
            html = html.replace(/^# (.*)$/gm, function(match, title) {
                headingCounter.h1 = 1;
                headingCounter.h2 = 0;
                var id = 'heading-' + headingCounter.h1;
                tocItems.push({ title: title, level: 1, id: id });
                return '<h1 id="' + id + '">' + title + '</h1>';
            });

            // 处理加粗 **...**
            html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

            // 处理斜体 *...*
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

            // 处理无序列表 -...
            html = html.replace(/^- (.*)$/gm, '<li>$1</li>');
            html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>');

            // 处理有序列表 1. ...
            html = html.replace(/^\d+\. (.*)$/gm, '<oli>$1</oli>');
            html = html.replace(/(<oli>.*<\/oli>\n?)+/g, function(match) {
                var items = match.replace(/<\/?oli>/g, function(m, p) {
                    return m === '<oli>' ? '<li>' : '</li>';
                });
                return '<ol>' + items + '</ol>';
            });

            // 处理分隔线 ---
            html = html.replace(/^---$/gm, '<hr>');

            // 处理段落（非空行）
            var lines = html.split('\n');
            var result = [];
            var inCodeBlock = false;

            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();

                // 跳过已处理的HTML标签
                if (line.match(/^<(h[1-6]|ul|ol|li|pre|hr|code)/)) {
                    result.push(line);
                    continue;
                }

                // 跳过空行
                if (!line) {
                    result.push('');
                    continue;
                }

                // 普通文本转为段落
                if (!line.match(/^<[^>]+>/)) {
                    result.push('<p>' + line + '</p>');
                } else {
                    result.push(line);
                }
            }

            return result.join('\n');
        }

        // 生成目录函数
        function generateToc() {
            var tocList = document.getElementById('tocList');
            if (!tocList) return;

            // 清空现有目录
            tocList.innerHTML = '';

            // 添加步骤目录
            var stepsSection = document.querySelector('.steps-section-title');
            if (stepsSection) {
                var stepItems = document.querySelectorAll('.step-title');
                stepItems.forEach(function(item, index) {
                    var li = document.createElement('li');
                    li.className = 'toc-item';
                    var a = document.createElement('a');
                    a.href = '#step-' + (index + 1);
                    a.className = 'toc-link level-2';
                    a.textContent = (index + 1) + '. ' + item.textContent;
                    a.addEventListener('click', function(e) {
                        e.preventDefault();
                        document.getElementById('step-' + (index + 1)).scrollIntoView({ behavior: 'smooth' });
                    });
                    li.appendChild(a);
                    tocList.appendChild(li);
                });
            }

            // 添加完整文档目录
            tocItems.forEach(function(item) {
                var li = document.createElement('li');
                li.className = 'toc-item';
                var a = document.createElement('a');
                a.href = '#' + item.id;
                a.className = 'toc-link level-' + item.level;
                a.textContent = item.title;
                a.addEventListener('click', function(e) {
                    e.preventDefault();
                    document.getElementById(item.id).scrollIntoView({ behavior: 'smooth', block: 'start' });
                });
                li.appendChild(a);
                tocList.appendChild(li);
            });
        }

        // 滚动高亮当前章节
        function setupScrollSpy() {
            var headings = document.querySelectorAll('.doc-content h1, .doc-content h2, .doc-content h3, .doc-content h4, .step-item');
            var tocLinks = document.querySelectorAll('.toc-link');

            function updateActiveToc() {
                var scrollPosition = window.scrollY + 150;

                var currentHeading = null;
                headings.forEach(function(heading) {
                    if (heading.offsetTop <= scrollPosition) {
                        currentHeading = heading;
                    }
                });

                tocLinks.forEach(function(link) {
                    link.classList.remove('active');
                });

                if (currentHeading) {
                    var id = currentHeading.id;
                    var activeLink = document.querySelector('.toc-link[href="#' + id + '"]');
                    if (activeLink) {
                        activeLink.classList.add('active');
                    }
                }
            }

            window.addEventListener('scroll', updateActiveToc);
            updateActiveToc();
        }

        function escapeHtml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#039;');
        }

        function getSkillId() {
            var params = window.location.search.substring(1).split('&');
            for (var i = 0; i < params.length; i++) {
                var pair = params[i].split('=');
                if (pair[0] === 'skill') {
                    return decodeURIComponent(pair[1] || 'comps');
                }
            }
            return 'comps';
        }
